	// ===============================================================
	const checkScrollChange = (entries) => {
		const currentScrollHeight = document.documentElement.scrollHeight;
		const oldHeight = localStorage.getItem('__SB_OLD_HEIGHT__') || 0;
		const gapH = 40;
		if (currentScrollHeight + gapH !== Number(oldHeight)) {
			localStorage.setItem('__SB_OLD_HEIGHT__', currentScrollHeight + gapH);
			window.parent.parent.postMessage(
				{
					type: 'loaded',
					source: 'storybook-preview',
					height: currentScrollHeight + gapH,
				},
				targetOrigin,
			);
		}
	};

	const resizeObserver = new ResizeObserver(checkScrollChange);

	const mutationObserver = new MutationObserver(checkScrollChange);

	window.addEventListener('DOMContentLoaded', () => {
		resizeObserver.observe(document.body);
		mutationObserver.observe(document.body, { childList: true, subtree: true });
	});
