<script src="/storybook-config.js"></script>
<script>
	const targetOrigin = window.__SB_CONFIG__?.parentOrigin;
	const oldHeight = localStorage.getItem('__SB_OLD_HEIGHT__');
	const postHeight = () => {
		if (window.parent === window) {
			setTimeout(postHeight, 1000);
			return;
		}

		const height = document.body.clientHeight;
		console.log('height22222:', height, oldHeight);
		if (height > 0) {
			//if (height !== oldHeight) {
			localStorage.setItem('__SB_OLD_HEIGHT__', height);
			window.parent.postMessage(
				{
					type: 'loaded',
					source: 'storybook-preview',
					height,
				},
				targetOrigin,
			);
			//}
		} else {
			setTimeout(postHeight, 1000);
		}
	};

	window.addEventListener('load', () => {
		setTimeout(() => postHeight(), 2000);
	});
</script>
